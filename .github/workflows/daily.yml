name: Daily AI News Digest

on:
  schedule:
    # Runs at 08:00 UTC every day. GitHub Actions cron times are UTC and
    # can be delayed by a few minutes (occasionally more) during high load
    # on GitHub's infrastructure — this is a known platform limitation,
    # not something you can tune away.
    - cron: "0 8 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab, for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync

      - name: Run test suite
        run: uv run pytest -v

      - name: Run daily pipeline
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: uv run python -m app.daily_runner
